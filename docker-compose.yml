services:
  backend:
    build:
      context: ./backend
    container_name: clipforge-backend
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
      - ./backend/jobs.json:/app/jobs.json
    environment:
      IN_DOCKER: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    container_name: clipforge-frontend
    environment:
      BACKEND_API_BASE: http://backend:8010
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
